<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RealtimeVehicleTracking - FrontEnd</title>
    <link rel="stylesheet" href="style.css">
</head>
    <body>
        <h1>"Olá linda tudo bem"</h1>
        <div class="container">
            <button id="teste">Lista de veículos</button>
            <p id="teste_res">Clique no botão para obter a lista de veículos.</p>
        </div> 

        <div class="container">
            <button id="veiculos">Adicionar Veículo</button>
            <input type="text" id="placa" placeholder="Placa do Veículo">
            <input type="text" id="modelo" placeholder="Modelo do Veículo">
            <input type="text" id="ano" placeholder="Ano do Veículo">
            <p id="veiculos_res">Clique no botão para adicionar um novo veículo.</p>
        </div> 
    </body>
    <script src="app.js"></script>
</html>
